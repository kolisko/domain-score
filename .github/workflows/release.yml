name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  tools-image-arch:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: tools/all-in-one/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/domain-score-tools:${{ github.ref_name }}-${{ matrix.arch }}
          cache-from: type=gha,scope=tools-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=tools-${{ matrix.arch }}

  tools-image:
    runs-on: ubuntu-latest
    needs: tools-image-arch
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish multi-arch manifest
        run: |
          version="${GITHUB_REF_NAME#v}"
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/domain-score-tools"
          docker buildx imagetools create \
            -t "${image}:${GITHUB_REF_NAME}" \
            -t "${image}:${version}" \
            -t "${image}:latest" \
            "${image}:${GITHUB_REF_NAME}-amd64" \
            "${image}:${GITHUB_REF_NAME}-arm64"

  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
