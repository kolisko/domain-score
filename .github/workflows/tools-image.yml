name: Tools Image

on:
  push:
    tags:
      - "tools-v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tools image tag, for example tools-v0.1.1"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  tools-image-arch:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: tools/all-in-one/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/domain-score-tools,push-by-digest=true,name-canonical=true,push=true
          provenance: false
          cache-from: type=gha,scope=tools-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=tools-${{ matrix.arch }}
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  tools-image:
    runs-on: ubuntu-latest
    needs: tools-image-arch
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve image tag
        id: tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.image_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          case "$tag" in
            tools-v*) ;;
            *) echo "image_tag must start with tools-v" >&2; exit 1 ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Publish multi-arch manifest
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/domain-score-tools"
          docker buildx imagetools create \
            -t "${image}:${{ steps.tag.outputs.tag }}" \
            $(for digest in /tmp/digests/*; do printf '%s@sha256:%s ' "${image}" "$(basename "${digest}")"; done)
