    category: evidence_quality
    mode: aggressive
    severity: info
    weight: 1
    coverage_status: planned
    implemented_by:
      tools: [nuclei]
      nuclei_template_paths: [http/honeypot, network/honeypot]
      dynamic_rule_ids: [template-id]
    finding_cardinality: dynamic_rule
    evidence_model: [asset, honeypot_signal, template_id]
    rationale: Honeypot detection changes how findings and asset ownership should be interpreted.
    remediation: Confirm whether the asset is an intentional honeypot and exclude it from normal risk scoring if appropriate.

