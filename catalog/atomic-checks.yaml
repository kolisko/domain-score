dynamic_expansion_backlog:
  - family: zap.plugin_id
    atomic_id_pattern: zap.<pluginid>
    expansion_rule: Create a source-specific atomic check only when the ZAP plugin id represents a distinct condition.
    not_allowed: Do not create one check per affected URL.

  - family: nuclei.template_id
    atomic_id_pattern: nuclei.<template-id>
    expansion_rule: Create one atomic check per stable template id when template metadata describes a unique vulnerability, exposure, takeover or misconfiguration.
    not_allowed: Do not create one check per matched host or URL.

  - family: greenbone.nvt_oid
    atomic_id_pattern: greenbone.nvt.<oid>
    expansion_rule: Create one atomic check per Greenbone NVT OID or canonical CVE when the NVT maps to a distinct vulnerability condition.
    not_allowed: Do not create one check per scanned port or host.

  - family: cve
    atomic_id_pattern: cve.<CVE-ID>
    expansion_rule: CVE can be an atomic check when the product/version/evidence indicates the concrete CVE condition.
    not_allowed: Do not create one check per asset affected by the same CVE.
