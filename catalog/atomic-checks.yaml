schema_version: 1
kind: domain-score.atomic-check-catalog
status: product_definition
updated: "2026-07-05"

purpose: >
  Product catalog of atomic checks that Domain Score should be able to reason
  about. This is not the runtime list of currently implemented Go checks.
  Runtime scan findings must reference one of these atomic check definitions
  whenever possible.

core_model:
  atomic_check: >
    A type of audited property, weakness, exposure, compliance requirement or
    vulnerability condition.
  finding: >
    A concrete occurrence of an atomic check on a concrete asset. One atomic
    check can produce many findings in one scan.
  tool: >
    An evidence source. A tool is not an atomic check. One tool can produce
    evidence for many checks.

identity_rules:
  - Do not create separate atomic checks for runtime values such as port 22,
    URL /login, host app.example.com or IP 203.0.113.10.
  - Runtime values belong to findings.evidence or findings.asset, not to the
    atomic check id.
  - It is valid to create separate atomic checks for stable external rule ids
    when the rule id represents a distinct condition, for example a ZAP plugin
    id, a Greenbone NVT OID, a Nuclei template id or a CVE id.
  - Prefer canonical domain-score ids for cross-tool concepts, and keep
    source-specific ids as coverage mappings.
  - If two tools detect the same condition, keep one atomic check with multiple
    evidence sources.

coverage_status_values:
  planned: Identified in the product catalog but not implemented yet.
  partial: Some evidence exists, but mapping/scoring/remediation is incomplete.
  implemented: Implemented as an internal check or normalized external mapping.
  external_raw: Raw tool output exists, but it is not yet mapped cleanly.
  not_applicable: Intentionally not applicable for Domain Score.

default_fields:
  id: Stable product id.
  title: Human-readable label.
  category: Scoring/reporting category.
  mode: safe or aggressive.
  severity: info, low, medium, high or critical.
  weight: Default scoring weight.
  coverage_status: Current implementation coverage.
  implemented_by: Internal check ids, external tools, rule ids or source feeds.
  finding_cardinality: none, one, many or dynamic_rule.
  evidence_model: Runtime fields expected in findings.
  rationale: Why this check matters.
  remediation: What a user should do when the check fails.

source_catalogs:
  manifest: catalog/generated/source-catalog-manifest.yaml
  source_to_canonical_map: catalog/source-to-canonical-map.yaml
  source_mapping_coverage: catalog/generated/source-mapping-coverage.yaml
  source_access_policy: catalog/source-access-policy.yaml
  internal_go:
    role: Native safe and aggressive checks implemented in Go.
    runtime_command: domain-score list-checks
  zap_baseline:
    role: OWASP ZAP passive web application/security header findings.
    stable_rule_key: pluginid
    generated_index: catalog/generated/zap-rule-index.yaml
  testssl:
    role: TLS protocol, cipher and vulnerability checks.
    stable_rule_key: id
    generated_index: catalog/generated/testssl-jsonid-index.yaml
  nuclei:
    role: Template-based exposure, CVE, misconfiguration and takeover checks.
    stable_rule_key: template-id
    generated_index: catalog/generated/nuclei-template-index.yaml
  greenbone:
    role: Network vulnerability tests from Greenbone Community Feed.
    stable_rule_key: nvt_oid
    generated_index: catalog/generated/greenbone-feed-capability-index.yaml
    generated_nvt_index: catalog/generated/greenbone-nvt-index.yaml.gz
    generated_notus_index: catalog/generated/greenbone-notus-advisory-index.yaml.gz
    generated_cert_index: catalog/generated/greenbone-cert-advisory-index.yaml.gz
    generated_gvmd_data_index: catalog/generated/greenbone-gvmd-data-object-index.yaml
    generated_scap_index: catalog/generated/greenbone-scap-cve-index.yaml.gz
  internetnl:
    role: Public standards categories for web and mail.
    stable_rule_key: category
    generated_index: catalog/generated/internetnl-subtest-index.yaml
  projectdiscovery:
    role: Subdomain inventory, HTTP probing, port inventory and template scans.
    generated_index: catalog/generated/projectdiscovery-capability-index.yaml
  amass:
    role: Attack surface mapping, subdomain enumeration and asset relationship graphing.
    generated_index: catalog/generated/amass-capability-index.yaml
  public_reputation_sources:
    role: DNSBL, URL reputation, malware and exposure reputation sources.

research_sources:
  zap_baseline:
    docs:
      - https://www.zaproxy.org/docs/docker/baseline-scan/
      - https://github.com/zaproxy/zaproxy/tree/main/docker
    evidence:
      - ZAP Baseline runs spidering plus passive scanning and does not perform active attacks.
      - Baseline rule configuration uses stable rule identifiers that can be mapped to atomic checks.
      - The default baseline config includes rule ids such as 10010, 10011, 10012, 10015, 10016, 10020, 10021, 10202, 2 and 3.
  projectdiscovery:
    docs:
      - https://docs.projectdiscovery.io/opensource/httpx/usage
      - https://docs.projectdiscovery.io/opensource/nuclei/running
    generated_index: catalog/generated/projectdiscovery-capability-index.yaml
    evidence:
      - httpx probes status, title, web server, technologies, CPE, favicon hash, JARM, HTTP/2, pipeline, websocket, TLS data, CDN/WAF, ASN and response metrics.
      - naabu discovers ports and can perform service discovery and service-version probes.
      - subfinder performs passive subdomain discovery and can include source attribution in JSONL.
      - nuclei filters and emits results by template-id, tags, severity and protocol type.
      - Generated capability index contains 43 repeatable ProjectDiscovery evidence capabilities for subfinder, httpx and naabu.
      - Inspected tools image currently resolves httpx to the Python HTTPX CLI wrapper, so ProjectDiscovery httpx runtime findings require an image fix.
  amass:
    docs:
      - https://owasp-amass.github.io/
      - https://github.com/owasp-amass/amass
    generated_index: catalog/generated/amass-capability-index.yaml
    evidence:
      - Runtime help confirms Amass v5.1.1 subcommands assoc, engine, enum, subs, track and viz.
      - Generated capability index contains 17 attack-surface mapping capabilities covering passive enumeration, active certificate grabs, AXFR attempts, brute force, ASN/CIDR scope and asset graph outputs.
  nuclei_templates_snapshot:
    source: ghcr.io/kolisko/domain-score-tools@sha256:013b814b66d07c5ce9703892d9b0434c35fdbe1e4c9b49d104ab7776ef057f7a
    generated_summary: catalog/generated/nuclei-template-summary.yaml
    generated_index: catalog/generated/nuclei-template-index.yaml
    nuclei_version: v3.10.0
    templates_count_observed: 13419
    templates_indexed: 13375
    top_level_template_groups:
      - cloud
      - file
      - ssl
      - javascript
      - http
      - network
      - dns
      - workflows
      - code
      - dast
    evidence:
      - Nuclei template-id is a stable source-specific rule id when a template describes one distinct condition.
      - Template groups include cves, exposures, misconfiguration, takeovers, default-logins, exposed-panels, technologies, malware, webshell and cloud configuration checks.
  testssl:
    docs:
      - https://github.com/testssl/testssl.sh
    generated_index: catalog/generated/testssl-jsonid-index.yaml
    evidence:
      - testssl.sh exposes protocol, cipher, forward secrecy, server defaults, server preference, headers, client simulation and vulnerability checks.
      - Vulnerability flags include Heartbleed, CCS injection, Ticketbleed, Opossum, ROBOT, STARTTLS injection, renegotiation, CRIME, BREACH, POODLE, TLS_FALLBACK_SCSV, SWEET32, BEAST, LUCKY13, Winshock, FREAK, LOGJAM, DROWN and RC4.
      - STARTTLS modes include ftp, smtp, lmtp, pop3, imap, xmpp, xmpp-server, telnet, ldap, nntp, sieve, postgres and mysql.
      - Generated index contains 107 testssl JSON IDs extracted from fileout/jsonID usage in the open-source script.
  zap_addons_snapshot:
    source: ghcr.io/kolisko/domain-score-tools@sha256:013b814b66d07c5ce9703892d9b0434c35fdbe1e4c9b49d104ab7776ef057f7a
    generated_index: catalog/generated/zap-rule-index.yaml
    evidence:
      - Generated index contains 104 ZAP rule IDs extracted from English help HTML bundled in installed ZAP add-ons.
      - Passive scan rules are marked safe; active scan rules from ascanrules are marked aggressive.
  greenbone:
    docs:
      - https://greenbone.github.io/docs/latest/22.4/container/index.html
      - https://github.com/greenbone/gvm-tools
    generated_index: catalog/generated/greenbone-feed-capability-index.yaml
    generated_nvt_index: catalog/generated/greenbone-nvt-index.yaml.gz
    evidence:
      - Greenbone Community Edition is open source and free to run, but it is a persistent multi-service stack, not a one-shot CLI.
      - The container stack includes gvmd, gsad, ospd-openvas, openvasd, Redis, PostgreSQL, vulnerability-tests, notus-data, scap-data and CERT feed data.
      - Atomic source-specific checks should be generated from NVT OIDs, CVEs and compliance policies when a running feed is available.
      - Inspected tools image contains greenbone-feed-sync, gvm-cli and rsync; NASL/Notus/CERT/GVMD/SCAP feed data is synced to an external cache and not stored inside the image.
      - Greenbone Enterprise Feed requires a paid key; Community Feed streams are tracked as community_free.
      - Generated NVT, Notus, CERT, GVMD data-object and SCAP CVE indexes are produced from synced Community feed files.
  internetnl:
    docs:
      - https://github.com/internetstandards/Internet.nl
      - https://internet.nl/
    generated_index: catalog/generated/internetnl-subtest-index.yaml
    evidence:
      - Public Internet.nl web and mail tests cover standards categories such as IPv6, DNSSEC, HTTPS, appsec/privacy, RPKI, mail authentication and STARTTLS/DANE.
      - Generated index contains 76 active Internet.nl subtests extracted statically from checks/categories.py and scoring constants.

checks:
  - id: network.open_ports
    title: Public open TCP ports inventory
    category: attack_surface
    mode: aggressive
    severity: medium
    weight: 5
    coverage_status: implemented
    implemented_by:
      internal_results: [tools.open_ports]
      tools: [naabu, shodan_internetdb]
    finding_cardinality: many
    evidence_model: [host, ip, port, protocol, source]
    rationale: Publicly reachable services define the externally attackable surface.
    remediation: Close unnecessary ports, restrict access, or document expected exposure.

  - id: service.unexpected_public_service
    title: Unexpected public service
    category: attack_surface
    mode: aggressive
    severity: medium
    weight: 6
    coverage_status: partial
    implemented_by:
      tools: [naabu, httpx, nuclei, greenbone]
    finding_cardinality: many
    evidence_model: [host, port, service, protocol, reason]
    rationale: Services outside the expected web/mail/DNS set often indicate accidental exposure.
    remediation: Validate business need, restrict by firewall/VPN, or harden the service.

  - id: service.version_disclosure
    title: Service or product version disclosure
    category: fingerprint
    mode: aggressive
    severity: low
    weight: 3
    coverage_status: partial
    implemented_by:
      tools: [httpx, zap, testssl, nuclei, greenbone]
      zap_plugin_ids: ["10036", "10037", "10061"]
    finding_cardinality: many
    evidence_model: [asset, protocol, header, banner, product, version]
    rationale: Version disclosure helps attackers select known exploits and target old components.
    remediation: Hide unnecessary version banners and keep disclosed components patched.

  - id: service.default_or_sample_content
    title: Default, sample or placeholder content exposed
    category: exposure
    mode: aggressive
    severity: medium
    weight: 5
    coverage_status: planned
    implemented_by:
      tools: [nuclei, zap]
    finding_cardinality: many
    evidence_model: [url, matched_pattern, technology]
    rationale: Default pages often reveal platform setup and unfinished deployment state.
    remediation: Remove sample content and replace default pages with production content.

  - id: dns.a_record_present
    title: Apex A record exists
    category: dns
    mode: safe
    severity: medium
    weight: 5
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [dns.a_record]
    finding_cardinality: one
    evidence_model: [records]
    rationale: A domain without an address record usually cannot serve the expected website.
    remediation: Configure an A record for the apex or document why the domain is not web-facing.

  - id: dns.aaaa_record_present
    title: IPv6 AAAA record exists
    category: dns
    mode: safe
    severity: low
    weight: 3
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [dns.ipv6]
    finding_cardinality: one
    evidence_model: [records]
    rationale: IPv6 improves reachability and is required by some modern standards programs.
    remediation: Add and monitor AAAA records for public web and mail services.

  - id: dns.nameservers_present
    title: Authoritative nameservers configured
    category: dns
    mode: safe
    severity: high
    weight: 5
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [dns.nameservers]
    finding_cardinality: one
    evidence_model: [ns_records]
    rationale: Without authoritative nameservers the domain cannot be resolved reliably.
    remediation: Configure at least two reliable authoritative nameservers.

  - id: dns.soa_present
    title: SOA record exists
    category: dns
    mode: safe
    severity: medium
    weight: 3
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [dns.soa]
    finding_cardinality: one
    evidence_model: [soa_record]
    rationale: SOA indicates the authoritative DNS zone is properly published.
    remediation: Fix authoritative DNS zone publication.

  - id: dns.txt_records_present
    title: TXT records inventory
    category: dns
    mode: safe
    severity: info
    weight: 1
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [dns.txt]
    finding_cardinality: one
    evidence_model: [txt_records]
    rationale: TXT records expose important security, ownership and service integration signals.
    remediation: Review TXT records for stale verification tokens and missing policies.

  - id: dns.caa_present
    title: CAA policy exists
    category: dns_security
    mode: safe
    severity: medium
    weight: 3
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [dns.caa]
    finding_cardinality: one
    evidence_model: [caa_records]
    rationale: CAA limits which certificate authorities can issue certificates for the domain.
    remediation: Publish CAA records for approved certificate authorities.

  - id: dns.dnssec_enabled
    title: DNSSEC enabled
    category: dns_security
    mode: safe
    severity: medium
    weight: 4
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [dns.dnssec_enabled]
      tools: [internetnl]
    finding_cardinality: one
    evidence_model: [ds_records, dnskey_records, validation_status]
    rationale: DNSSEC protects DNS answers from tampering when validating resolvers are used.
    remediation: Enable DNSSEC at the DNS provider and registrar.

  - id: dns.ttl_sanity
    title: DNS TTL sanity
    category: dns
    mode: safe
    severity: low
    weight: 2
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [dns.ttl_sanity]
    finding_cardinality: one
    evidence_model: [min_ttl, max_ttl]
    rationale: Extremely low or high TTL values can hurt reliability and operational agility.
    remediation: Use TTL values appropriate for stable production records.

  - id: dns.wildcard_enabled
    title: Wildcard DNS exists
    category: dns
    mode: safe
    severity: low
    weight: 2
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [dns.wildcard]
    finding_cardinality: one
    evidence_model: [wildcard_records]
    rationale: Wildcard DNS can hide typos, confuse inventory and increase attack surface.
    remediation: Remove wildcard DNS unless it is intentionally required and monitored.

  - id: dns.apex_www_canonical
    title: Apex and www canonicality
    category: dns
    mode: safe
    severity: low
    weight: 2
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [dns.www_canonical]
    finding_cardinality: one
    evidence_model: [apex, www, redirect_or_address_relation]
    rationale: Inconsistent apex/www handling causes SEO, certificate and user confusion.
    remediation: Pick one canonical host and redirect the other consistently.

  - id: dns.axfr_not_allowed
    title: DNS zone transfer is not allowed
    category: dns_security
    mode: aggressive
    severity: high
    weight: 6
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [aggressive.dns_axfr]
      tools: [amass]
    finding_cardinality: many
    evidence_model: [nameserver, transfer_status, leaked_records]
    rationale: Open AXFR can leak the full DNS zone and internal naming structure.
    remediation: Restrict zone transfers to approved secondary nameservers only.

  - id: email.mx_present
    title: MX records exist
    category: email_security
    mode: safe
    severity: medium
    weight: 3
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [dns.mx]
    finding_cardinality: one
    evidence_model: [mx_records]
    rationale: MX records define mail receiving infrastructure and influence mail security checks.
    remediation: Configure MX records or explicitly document that the domain does not receive mail.

  - id: email.spf_present
    title: SPF policy exists
    category: email_security
    mode: safe
    severity: high
    weight: 4
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [dns.spf]
      tools: [internetnl]
    finding_cardinality: one
    evidence_model: [spf_record, mechanisms]
    rationale: SPF reduces sender spoofing by declaring authorized sending infrastructure.
    remediation: Publish a single SPF TXT record with accurate sender mechanisms.

  - id: email.spf_policy_too_permissive
    title: SPF policy is too permissive
    category: email_security
    mode: safe
    severity: medium
    weight: 4
    coverage_status: partial
    implemented_by:
      internal_check_ids: [dns.spf]
      tools: [internetnl]
    finding_cardinality: one
    evidence_model: [spf_record, qualifier, mechanisms]
    rationale: Permissive SPF policies reduce spoofing protection.
    remediation: Use a stricter SPF policy and remove broad includes or +all.

  - id: email.dmarc_present
    title: DMARC policy exists
    category: email_security
    mode: safe
    severity: high
    weight: 5
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [dns.dmarc]
      tools: [internetnl]
    finding_cardinality: one
    evidence_model: [dmarc_record, policy]
    rationale: DMARC aligns SPF/DKIM results and tells receivers how to handle spoofed mail.
    remediation: Publish a DMARC record at _dmarc with reporting and an enforcement path.

  - id: email.dmarc_policy_not_enforcing
    title: DMARC policy is not enforcing
    category: email_security
    mode: safe
    severity: medium
    weight: 4
    coverage_status: partial
    implemented_by:
      internal_check_ids: [dns.dmarc]
      tools: [internetnl]
    finding_cardinality: one
    evidence_model: [policy, subdomain_policy, pct]
    rationale: p=none only monitors mail and does not ask receivers to reject spoofed mail.
    remediation: Move from p=none to quarantine or reject after monitoring false positives.

  - id: email.dkim_selector_present
    title: DKIM selector detected
    category: email_security
    mode: safe
    severity: medium
    weight: 3
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [dns.dkim]
      tools: [internetnl]
    finding_cardinality: many
    evidence_model: [selector, txt_record]
    rationale: DKIM signatures improve sender authentication and DMARC alignment.
    remediation: Enable DKIM signing for mail platforms and publish selector records.

  - id: email.mta_sts_present
    title: MTA-STS policy exists
    category: email_security
    mode: safe
    severity: medium
    weight: 3
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [dns.mta_sts]
      tools: [internetnl]
    finding_cardinality: one
    evidence_model: [txt_record, policy_url, policy_status]
    rationale: MTA-STS lets senders enforce encrypted SMTP delivery.
    remediation: Publish _mta-sts TXT and a valid HTTPS policy.

  - id: email.tls_rpt_present
    title: TLS-RPT reporting exists
    category: email_security
    mode: safe
    severity: low
    weight: 2
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [dns.tls_rpt]
      tools: [internetnl]
    finding_cardinality: one
    evidence_model: [tls_rpt_record]
    rationale: TLS-RPT reports failed encrypted mail delivery attempts.
    remediation: Publish _smtp._tls TXT with a reporting destination.

  - id: email.bimi_present
    title: BIMI record exists
    category: email_security
    mode: safe
    severity: info
    weight: 1
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [dns.bimi]
    finding_cardinality: one
    evidence_model: [bimi_record]
    rationale: BIMI can improve brand display when mail authentication is strong.
    remediation: Configure BIMI only after SPF, DKIM and DMARC enforcement are healthy.

  - id: tls.certificate_present_and_valid
    title: TLS certificate is present and valid
    category: tls
    mode: safe
    severity: high
    weight: 6
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [tls.certificate_valid]
      tools: [testssl, internetnl]
    finding_cardinality: one
    evidence_model: [subject, issuer, not_after, chain_status]
    rationale: Invalid certificates break secure browsing and train users to ignore warnings.
    remediation: Install a trusted certificate with a complete chain.

  - id: tls.certificate_expiring_soon
    title: TLS certificate expires soon
    category: tls
    mode: safe
    severity: medium
    weight: 4
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [tls.expiry]
      tools: [testssl]
    finding_cardinality: one
    evidence_model: [not_after, days_until_expiry]
    rationale: Near-expiry certificates create outage risk.
    remediation: Renew certificates early and monitor expiry.

  - id: tls.hostname_mismatch
    title: TLS certificate hostname mismatch
    category: tls
    mode: safe
    severity: high
    weight: 5
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [tls.hostname]
      tools: [testssl, internetnl]
    finding_cardinality: one
    evidence_model: [hostname, san_names]
    rationale: Hostname mismatch causes browser trust failures.
    remediation: Issue a certificate that covers every served hostname.

  - id: tls.chain_incomplete_or_untrusted
    title: TLS certificate chain problem
    category: tls
    mode: safe
    severity: high
    weight: 4
    coverage_status: implemented
    implemented_by:
      internal_check_ids: [tls.chain]
      tools: [testssl, internetnl]
    finding_cardinality: one
    evidence_model: [chain_length, verification_error]
    rationale: Incomplete or untrusted chains fail for some clients.
    remediation: Serve the full intermediate chain from a trusted CA.

  - id: tls.weak_protocol_enabled
    title: Weak TLS protocol enabled
    category: tls
    mode: aggressive
    severity: high
    weight: 7
    coverage_status: external_raw
    implemented_by:
      tools: [testssl]
      testssl_ids: [SSLv2, SSLv3, TLS1, TLS1_1]
    finding_cardinality: many
    evidence_model: [host, port, protocol, finding]
    rationale: Old TLS/SSL protocol versions have known design and downgrade weaknesses.
    remediation: Disable SSLv2, SSLv3, TLS 1.0 and TLS 1.1.

  - id: tls.weak_cipher_enabled
    title: Weak TLS cipher enabled
    category: tls
    mode: aggressive
    severity: high
    weight: 7
    coverage_status: external_raw
    implemented_by:
      tools: [testssl]
      testssl_groups: [NULL, anonymous, EXPORT, LOW, 3DES, RC4, CBC]
    finding_cardinality: many
    evidence_model: [host, port, cipher, protocol, reason]
    rationale: Weak ciphers can reduce confidentiality or expose protocol attacks.
    remediation: Use modern AEAD cipher suites and remove legacy cipher support.

  - id: tls.forward_secrecy_missing
    title: Forward secrecy missing
    category: tls
    mode: aggressive
    severity: medium
    weight: 5
    coverage_status: external_raw
    implemented_by:
      tools: [testssl]
    finding_cardinality: many
    evidence_model: [host, port, cipher_suites]
    rationale: Without forward secrecy, key compromise can expose previously captured traffic.
    remediation: Prefer ECDHE/DHE cipher suites and modern TLS configuration.

  - id: tls.known_protocol_vulnerability
    title: Known TLS protocol vulnerability
    category: tls
    mode: aggressive
    severity: critical
    weight: 8
    coverage_status: external_raw
    implemented_by:
      tools: [testssl, nuclei, greenbone]
      examples: [heartbleed, robot, drown, freak, logjam, sweet32, poodle, crime, breach]
    finding_cardinality: dynamic_rule
    evidence_model: [host, port, vulnerability_id, tool_rule_id, severity]
    rationale: Known TLS vulnerabilities often have public exploit tooling.
    remediation: Patch affected software and disable vulnerable protocol features.

  - id: tls.testssl_signal_requires_review
    title: testssl.sh signal requiring review
    category: tls
    mode: aggressive
    severity: low
    weight: 2
    coverage_status: external_raw
    implemented_by:
      tools: [testssl]
      dynamic_rule_ids: [testssl_json_id]
    finding_cardinality: dynamic_rule
    evidence_model: [host, port, json_id, severity, finding]
    rationale: testssl.sh emits detailed TLS, HTTP/TLS header and compatibility signals that should be retained even before each JSON ID has a more specific canonical mapping.
