schema_version: 1
kind: domain-score.source-to-canonical-map
updated: "2026-07-05"

purpose: >
  Mapping layer from source-specific rule, subtest and capability IDs to
  canonical Domain Score atomic check IDs. Generated source catalogs remain the
  evidence source of what tools can emit; this file describes how those signals
  should be normalized for scoring and reporting.

mapping_model:
  source_id: Stable source-specific atomic id, group id, feed stream or capability id.
  canonical_id: Existing id from catalog/atomic-checks.yaml.
  match_type:
    exact: Match a single source id exactly.
    prefix: Match all source ids with the given prefix.
    group: Match a source catalog group or path group.
    stream: Match a source feed stream.
  confidence:
    high: Direct semantic match.
    medium: Good operational match but may need parser context.
    low: Broad fallback where precise mapping should be improved later.

