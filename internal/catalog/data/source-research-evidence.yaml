schema_version: 1
kind: domain-score.source-research-evidence
updated: "2026-07-05"

purpose: >
  Research evidence for the source catalogs and access policies used by the
  Domain Score atomic-check catalog. This file records which official source
  repositories, documentation pages, public APIs or feeds were used to derive
  the cataloged check surface.

scope_notes:
  - This is a bounded v1 evidence snapshot, not proof that every future upstream rule has been reviewed.
  - Generated catalogs capture large rule/feed surfaces separately from canonical checks.
  - Paid, enterprise-only or credentials-required sources are identified so they do not become required for the free/open-source audit path.

sources:
  - id: nuclei
    title: ProjectDiscovery Nuclei engine
    access_class: open_source_free
    research_status: inspected_for_v1
    evidence_types:
      - source_code_repository
      - official_documentation
      - runtime_capability
    source_urls:
      - https://github.com/projectdiscovery/nuclei
      - https://docs.projectdiscovery.io/tools/nuclei/overview
    generated_catalogs:
      - catalog/generated/projectdiscovery-capability-index.yaml
    derived_check_surface:
      - template execution engine capability
      - protocol coverage and finding metadata capability
      - runtime vulnerability finding normalization
    exclusions:
      - Nuclei cloud/pro/enterprise features are not required for the free path.

  - id: nuclei_templates
    title: ProjectDiscovery nuclei-templates
    access_class: open_source_free
    research_status: inspected_for_v1
    evidence_types:
      - source_code_repository
      - template_metadata
      - generated_index
    source_urls:
      - https://github.com/projectdiscovery/nuclei-templates
      - https://docs.projectdiscovery.io/templates/introduction
    generated_catalogs:
      - catalog/generated/nuclei-template-index.yaml
      - catalog/generated/nuclei-template-summary.yaml
    derived_check_surface:
      - CVE and vulnerability templates
      - exposure and misconfiguration templates
      - technology and panel detection templates
      - takeover and token disclosure templates
    exclusions:
      - Templates that require target credentials, cloud credentials or ownership context are opt-in and credentials-required at runtime.

  - id: subfinder
    title: ProjectDiscovery Subfinder
    access_class: open_source_free
    research_status: inspected_for_v1
    evidence_types:
      - source_code_repository
      - provider_catalog
      - runtime_capability
    source_urls:
      - https://github.com/projectdiscovery/subfinder
      - https://docs.projectdiscovery.io/tools/subfinder/overview
    generated_catalogs:
      - catalog/generated/projectdiscovery-capability-index.yaml
      - catalog/generated/subfinder-provider-index.yaml
    derived_check_surface:
      - passive subdomain inventory
      - provider availability and key requirement classification
      - discovered asset evidence for downstream checks
    exclusions:
      - Provider-specific paid or key-required data sources are not required for the free path.

  - id: httpx_projectdiscovery
    title: ProjectDiscovery httpx
    access_class: open_source_free
    research_status: inspected_for_v1_runtime_gap
    evidence_types:
      - source_code_repository
      - official_documentation
      - runtime_capability
    source_urls:
      - https://github.com/projectdiscovery/httpx
      - https://docs.projectdiscovery.io/tools/httpx/overview
    generated_catalogs:
      - catalog/generated/projectdiscovery-capability-index.yaml
    derived_check_surface:
      - HTTP service probing
      - status, title, content length and technology metadata
      - HTTP/TLS response evidence for downstream checks
    exclusions:
      - Current tools image must be fixed because `httpx` can resolve to the Python HTTPX CLI wrapper.

  - id: naabu
    title: ProjectDiscovery Naabu
    access_class: open_source_free
    research_status: inspected_for_v1
    evidence_types:
      - source_code_repository
      - official_documentation
      - runtime_capability
    source_urls:
      - https://github.com/projectdiscovery/naabu
      - https://docs.projectdiscovery.io/tools/naabu/overview
    generated_catalogs:
      - catalog/generated/projectdiscovery-capability-index.yaml
    derived_check_surface:
      - open port inventory
      - InternetDB-assisted passive port evidence
      - target service discovery for downstream probing
    exclusions:
      - Active port scanning remains explicit opt-in.

  - id: amass
    title: OWASP Amass
    access_class: open_source_free
    research_status: inspected_for_v1
    evidence_types:
      - source_code_repository
      - provider_catalog
      - runtime_capability
    source_urls:
      - https://github.com/owasp-amass/amass
      - https://owasp-amass.github.io/
    generated_catalogs:
      - catalog/generated/amass-capability-index.yaml
      - catalog/generated/amass-provider-index.yaml
    derived_check_surface:
      - passive domain enumeration
      - data source/provider classification
      - DNS graph and asset relationship evidence
    exclusions:
      - Active brute force, alteration and provider-specific paid sources are not part of the default free path.

  - id: zap
    title: OWASP ZAP
    access_class: open_source_free
    research_status: inspected_for_v1
    evidence_types:
      - source_code_repository
      - official_alert_catalog
      - generated_index
